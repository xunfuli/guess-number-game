<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XFL❤️YJX</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            height: 100vh;
            overflow: hidden;
            font-family: "Microsoft YaHei", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* 爱心容器 */
        #heart {
            position: relative;
            width: 400px;
            height: 400px;
            transform-style: preserve-3d;
            animation: rotateHeart 10s linear infinite;
        }
        @keyframes rotateHeart {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }
        /* 文字样式 */
        .text-piece {
            position: absolute;
            color: #ff69b4;
            font-size: 15px;
            white-space: nowrap;
            user-select: none;
            pointer-events: none;
            transform-style: preserve-3d;
        }
        .name-text {
            font-size: 17px;
            color: #ff1493;
            font-weight: bold;
        }
        /* 音乐按钮（超大超明显） */
        .music-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #ff1493;
            color: #fff;
            border: none;
            font-size: 28px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(255, 20, 147, 0.8);
            z-index: 999;
            transition: all 0.3s ease;
        }
        .music-btn:hover {
            transform: scale(1.1);
        }
        /* 调试提示（临时显示） */
        .tip {
            position: fixed;
            bottom: 120px;
            right: 30px;
            color: #fff;
            font-size: 14px;
            background: rgba(0,0,0,0.8);
            padding: 8px 12px;
            border-radius: 8px;
            z-index: 998;
        }
        /* 手机适配 */
        @media (max-width: 480px) {
            .music-btn {
                width: 60px;
                height: 60px;
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <!-- 调试提示 -->
    <div class="tip">点击粉色按钮播放音乐💓</div>
    <!-- 爱心容器 -->
    <div id="heart"></div>
    <!-- 音乐开关按钮 -->
    <button class="music-btn" id="musicBtn">🎵</button>

    <!-- 改用100%可用的音乐链接（抖音超火《花海》纯音乐） -->
    <audio id="music" loop>
        <source src="https://audio6.yinyuetai.com/uploads/videos/common/8E5A01554D4645E59237350466512009.mp3?sc=web&br=192k&fs=ios" type="audio/mpeg">
    </audio>

    <script>
        // 全局状态
        let musicPlaying = false;
        const music = document.getElementById('music');
        const musicBtn = document.getElementById('musicBtn');

        // 1. 填充爱心文字
        const loveTexts = [
            "XFL❤️YJX", "YJX，XFL爱你", "我爱你", "I love you", "愛してる", "사랑해요"
        ];
        function getHeartPoints() {
            const points = [];
            for (let t = 0; t < Math.PI * 2; t += 0.03) {
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                points.push({ x, y });
            }
            return points;
        }
        function fillHeart() {
            const heart = document.getElementById('heart');
            const points = getHeartPoints();
            points.forEach((point, i) => {
                const text = document.createElement('span');
                text.classList.add('text-piece');
                const randomText = loveTexts[Math.floor(Math.random() * loveTexts.length)];
                text.textContent = randomText;
                if (randomText.includes('XFL') || randomText.includes('YJX')) text.classList.add('name-text');
                text.style.color = Math.random() > 0.5 ? '#ff69b4' : '#ff1493';
                text.style.left = `${point.x * 15 + 200}px`;
                text.style.top = `${point.y * 15 + 200}px`;
                text.style.transform = `translateZ(${Math.random() * 40}px)`;
                heart.appendChild(text);
            });
        }

        // 2. 修复音乐播放逻辑（核心！）
        function toggleMusic() {
            // 强制解锁音频上下文（解决浏览器限制）
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) new AudioContext().resume();

            if (!musicPlaying) {
                // 播放音乐（加超时重试）
                const playPromise = music.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        musicPlaying = true;
                        musicBtn.textContent = "🔇";
                        musicBtn.style.background = "#ff69b4";
                        alert("音乐播放成功啦～🎶"); // 测试提示
                    }).catch(err => {
                        // 降级方案：直接下载播放
                        alert(`播放失败，原因：${err.message}\n已为你打开音乐链接`);
                        window.open(music.src, '_blank');
                    });
                }
            } else {
                // 暂停音乐
                music.pause();
                musicPlaying = false;
                musicBtn.textContent = "🎵";
                musicBtn.style.background = "#ff1493";
            }
        }

        // 3. 页面加载+绑定按钮
        window.addEventListener('load', () => {
            fillHeart();
            // 绑定按钮（双重保险）
            musicBtn.onclick = toggleMusic;
            // 点击任意位置也能触发（备用）
            document.body.addEventListener('click', (e) => {
                if (e.target !== musicBtn && !musicPlaying) toggleMusic();
            }, { once: true });
        });
    </script>
</body>
</html>
