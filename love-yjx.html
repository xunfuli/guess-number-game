<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>XFL❤️YJX</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            height: 100vh;
            overflow: hidden;
            font-family: "Microsoft YaHei", sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* 3D旋转爱心容器 */
        #heart {
            position: relative;
            width: 400px;
            height: 400px;
            transform-style: preserve-3d;
            animation: rotateHeart 10s linear infinite;
        }
        @keyframes rotateHeart {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(360deg); }
        }
        /* 文字样式（疏朗分布） */
        .text-piece {
            position: absolute;
            color: #ff69b4;
            font-size: 15px;
            white-space: nowrap;
            user-select: none;
            pointer-events: none;
            transform-style: preserve-3d;
        }
        /* 专属名字样式（醒目） */
        .name-text {
            font-size: 17px;
            color: #ff1493;
            font-weight: bold;
        }
        /* 手机适配 */
        @media (max-width: 480px) {
            #heart {
                width: 300px;
                height: 300px;
            }
        }
    </style>
</head>
<body>
    <!-- 爱心容器 -->
    <div id="heart"></div>

    <script>
        // 1. 填充专属爱心文字
        const loveTexts = [
            "XFL❤️YJX", "YJX，XFL爱你", "我爱你", "I love you",
            "愛してる", "사랑해요", "永远在一起", "专属心动"
        ];

        // 生成爱心坐标（疏朗分布）
        function getHeartPoints() {
            const points = [];
            for (let t = 0; t < Math.PI * 2; t += 0.03) {
                const x = 16 * Math.pow(Math.sin(t), 3);
                const y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
                points.push({ x, y });
            }
            return points;
        }

        // 渲染爱心
        function fillHeart() {
            const heart = document.getElementById('heart');
            const points = getHeartPoints();
            points.forEach((point, i) => {
                const text = document.createElement('span');
                text.classList.add('text-piece');
                const randomText = loveTexts[Math.floor(Math.random() * loveTexts.length)];
                text.textContent = randomText;

                // 名字特殊样式
                if (randomText.includes('XFL') || randomText.includes('YJX')) {
                    text.classList.add('name-text');
                }

                text.style.color = Math.random() > 0.5 ? '#ff69b4' : '#ff1493';
                text.style.left = `${point.x * 15 + (heart.offsetWidth/2)}px`;
                text.style.top = `${point.y * 15 + (heart.offsetHeight/2)}px`;
                text.style.transform = `translateZ(${Math.random() * 40}px)`;

                heart.appendChild(text);
            });
        }

        // 2. 页面加载后启动
        window.addEventListener('load', () => {
            fillHeart();
        });
    </script>
</body>
</html>
