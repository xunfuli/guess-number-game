<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YJX❤️XFL 五一见面倒计时</title>
    <style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body {
        background: #fff0f5; /* 核心修改：淡粉色背景 */
        font-family: "Microsoft YaHei", sans-serif;
        overflow: hidden;
    }
    /* 左侧情话（调整文字颜色，适配淡粉色背景） */
    .love-words {
        position: absolute;
        top: 50px;
        left: 50px;
        color: #666; /* 深灰色，比原来的#888更清晰 */
        font-size: 14px;
        line-height: 2;
        z-index: 10;
    }
    /* 底部倒计时（调整文字颜色，更搭淡粉色） */
    .clock {
        position: absolute;
        bottom: 50px;
        left: 50px;
        color: #555; /* 稍深的灰色，提升可读性 */
        z-index: 10;
    }
    .clock .title {
        font-size: 18px;
        color: #e63946; /* 浅玫红，比原来的#ff1493更柔和 */
        margin-bottom: 10px;
    }
    .clock .time {
        font-size: 36px;
        font-weight: bold;
        color: #ff8fa3; /* 浅粉橘，和背景呼应 */
    }
    /* 爱心树容器 */
    #heartTree {
        position: absolute;
        top: 0;
        right: 0;
        width: 70%;
        height: 100vh;
        z-index: 1;
    }
    /* 手机适配 */
    @media (max-width: 768px) {
        .love-words {
            top: 20px;
            left: 20px;
            font-size: 12px;
        }
        .clock {
            bottom: 20px;
            left: 20px;
        }
        .clock .title {
            font-size: 14px;
        }
        .clock .time {
            font-size: 24px;
        }
        #heartTree {
            width: 100%;
            opacity: 0.8;
        }
    }
</style>
</head>
<body>

    <!-- 左侧情话 -->
    <div class="love-words">
        亲爱的YJX：<br>
        一直期待着五一的到来<br>
        这几天总是梦到你 心里总会不自觉地想起你，会想象见面时的样子 <br>
        期待着和你一起散步、聊天、安安静静待在一起的时刻 <br>
      越靠近见面的日子，就越开心，越激动。<br>
        期待和你五一见面～❤️ <br>
                        ----XFL
    </div>

    <!-- 底部五一倒计时 -->
    <div class="clock">
        <div class="title">距离我们五一见面还有......</div>
        <div class="time" id="clock">00 天 00 小时 00 分钟 00 秒</div>
    </div>

    <!-- 爱心树 -->
    <canvas id="heartTree"></canvas>

    <script>
        // 1. 五一见面倒计时
        function startCountdown() {
            // 五一见面日期：2026年5月1日 0点0分0秒（月是0-11，5月写4）
            const meetDate = new Date(2026, 4, 1, 0, 0, 0);
            const clockEl = document.getElementById('clock');

            function updateTime() {
                const now = new Date();
                const diff = meetDate - now;

                // 倒计时结束
                if (diff <= 0) {
                    clockEl.innerHTML = "终于见面啦！❤️";
                    return;
                }

                // 计算天/时/分/秒
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((diff % (1000 * 60)) / 1000);

                // 补零格式化
                const formatNum = num => num.toString().padStart(2, '0');
                clockEl.innerHTML = `${formatNum(days)} 天 ${formatNum(hours)} 小时 ${formatNum(minutes)} 分钟 ${formatNum(seconds)} 秒`;
            }

            updateTime();
            setInterval(updateTime, 1000);
        }

        // 2. 爱心树绘制
        const canvas = document.getElementById('heartTree');
        const ctx = canvas.getContext('2d');

        // 适配画布尺寸
        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // 爱心类
        class Heart {
            constructor(x, y, size, color) {
                this.x = x;
                this.y = y;
                this.size = size;
                this.color = color;
                this.vx = (Math.random() - 0.5) * 0.3;
                this.vy = Math.random() * -0.3 - 0.1;
                this.alpha = 1;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.alpha;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                const x = this.x, y = this.y, s = this.size / 10;
                ctx.moveTo(x, y);
                ctx.bezierCurveTo(x + s*8, y - s*5, x + s*15, y + s*5, x, y + s*15);
                ctx.bezierCurveTo(x - s*15, y + s*5, x - s*8, y - s*5, x, y);
                ctx.fill();
                ctx.restore();
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.alpha -= 0.003;
            }
        }

        // 生成爱心树
        let hearts = [];
        function createHeartTree() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const trunkY = canvas.height - 150;

            // 画树干
            ctx.fillStyle = '#663300';
            ctx.fillRect(centerX - 15, trunkY, 30, canvas.height - trunkY);

            // 添加爱心
            function addHearts() {
                for (let t = 0; t < Math.PI * 2; t += 0.1) {
                    const xHeart = 16 * Math.pow(Math.sin(t), 3);
                    const yHeart = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));

                    const scale = 15;
                    const x = centerX + xHeart * scale;
                    const y = centerY + yHeart * scale - 50;

                    const size = Math.random() * 30 + 10;
                    const colors = ['#ff69b4', '#ff1493', '#ffb6c1', '#ffc0cb', '#ff8c00', '#ffd700'];
                    const color = colors[Math.floor(Math.random() * colors.length)];

                    if (Math.random() > 0.8 && hearts.length < 300) {
                        hearts.push(new Heart(x, y, size, color));
                    }
                }
            }

            // 初始爱心
            addHearts();

            // 动画循环
            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // 重绘树干
                ctx.fillStyle = '#663300';
                ctx.fillRect(centerX - 15, trunkY, 30, canvas.height - trunkY);

                // 更新爱心
                hearts = hearts.filter(heart => {
                    heart.update();
                    heart.draw();
                    return heart.alpha > 0;
                });

                // 补充爱心
                addHearts();

                requestAnimationFrame(animate);
            }
            animate();
        }

        // 3. 页面加载启动
        window.addEventListener('load', () => {
            startCountdown();
            createHeartTree();
        });
    </script>
</body>
</html>
